baseURL: "https://mesflit.github.io/"
languageCode: "en-us"
title: "Mesflit"
paginate: 8
enableEmoji: true
pygmentsUseClasses: true
enableRobotsTXT: true
buildDrafts: false
enableInlineShortcodes: true

params:
  description: "Mesflit's Blog"
  ShowReadingTime: true
  ShowShareButton: true
  author: "Mesflit"
  defaultTheme: "auto"
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  
  
theme:
  - "PaperMod"


defaultContentLanguage: "tr"
languages:
  en:
    languageName: "English"
    title: "Mesflit - English"
    weight: 1
    contentDir: "content/en"
    params:
      description: "Mesflit's Blog"
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Github
          url: https://github.com/mesflit/
          weight: 10

  tr:
    languageName: "Türkçe"
    title: "Mesflit - Türkçe"
    weight: 2
    contentDir: "content/tr"
    params:
      description: "Mesflit'in Blogu"
    taxonomies:
      category: kategoriler
      tag: etiketler
      series: seriler
    menu:
      main:
        - name: Github
          url: https://github.com/mesflit/
          weight: 10
