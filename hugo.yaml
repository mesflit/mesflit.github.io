baseURL: "https://mesflit.github.io/"
languageCode: "en-us"
title: "Mesflit"
paginate: 8
enableEmoji: true
pygmentsUseClasses: true
enableRobotsTXT: true
buildDrafts: false
enableInlineShortcodes: true

params:
  description: "Mesflit's Blog"
  ShowReadingTime: true
  ShowShareButton: true
  author: "Mesflit"
  defaultTheme: "auto"
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  socialIcons:
    - name: github
      url: "https://github.com/mesflit/"
    - name: youtube
      url: "https://www.youtube.com/@mesflit"
  
theme: [PaperMod]


defaultContentLanguage: "tr"
languages:
  en:
    languageName: "English"
    title: "Mesflit - English"
    weight: 1
    contentDir: "content/en"
    params:
      description: "Mesflit's Blog"
      homeInfoParams:
       Title: "Mesflit's blog"
       Content: >
         Welcome to my blog.
         - Here, I will teach you everything I know about Linux, Android, and technology.
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Github
          url: https://github.com/mesflit/
          weight: 10

  tr:
    languageName: "Türkçe"
    title: "Mesflit - Türkçe"
    weight: 2
    contentDir: "content/tr"
    params:
      description: "Mesflit'in Blogu"
      homeInfoParams:
       Title: "Mesflit'in Bloğu"
       Content: >
         Merhaba bloğuma hoş geldiniz.
         - Burada size Linux, Android ve teknoloji hakkında bildiğim her şeyi öğreteceğim.
    taxonomies:
      category: kategoriler
      tag: etiketler
      series: seriler
    menu:
      main:
        - name: Github
          url: https://github.com/mesflit/
          weight: 10
    